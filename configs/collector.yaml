# NATFlow Dataplane Collector configuration.
# Unknown keys are rejected on load, so typos fail fast.
#
# Hot-reloadable on SIGHUP (or with --watch-config): rules.*, clickhouse.batch_size,
# flush_interval_ms, writer_workers, max_queue_rows, retry_*, pipeline.backpressure_mode,
# logging.level, s3.enabled, s3.archive_after_days. Changing receiver.* or
# clickhouse.addr/database/username requires a restart (logged as a warning).

server:
  name: "dp-india-01"
  isp_id: 1
  device_id_default: 0

receiver:
  bind_ip: "0.0.0.0"
  ports:
    netflow5: 2055
    netflow9: 9995
    ipfix: 4739
  udp_read_buffer_mb: 128
  workers: 6

clickhouse:
  addr: "127.0.0.1:9000"
  database: "natlogs"
  username: "default"
  password: ""
  batch_size: 10000
  flush_interval_ms: 1000
  writer_workers: 4          # sharded writers (records sharded by exporter_ip+device_id)
  max_queue_rows: 100000     # per-writer queue capacity
  retry_max_attempts: 3
  retry_backoff_ms: 250
  shutdown_drain_ms: 15000
  # Tuning (see deploy/clickhouse/README.md). compression/max_open_conns need a
  # restart; async_insert/wait_for_async_insert are hot-reloadable.
  compression: "lz4"            # lz4 | lz4hc | zstd | none
  max_open_conns: 0             # 0 = auto (writer_workers*2+2, min 8)
  async_insert: false           # ClickHouse server-side async inserts
  wait_for_async_insert: true   # false = fire-and-forget (higher tput, weaker durability)

pipeline:
  backpressure_mode: "drop_new"   # block | drop_new | drop_old

rules:
  skip_dns: true
  skip_private_to_private: true
  skip_zero_bytes: true

s3:
  enabled: false
  endpoint: "https://s3.wasabisys.com"   # or http://127.0.0.1:9000 for MinIO
  region: "us-east-1"
  bucket: "natflow-archive"
  access_key: ""
  secret_key: ""
  path_prefix: "natflow"
  archive_after_days: 7
  export_format: "csvgz"   # csvgz | parquet (parquet falls back to csvgz in v0.3.1)

security:
  # How to treat packets from an exporter not in the device registry below:
  #   allow   - decode with the default server isp_id/device_id (backward compatible)
  #   observe - decode with isp_id=0/device_id=0 (visibility without trust)
  #   reject  - drop the packet (RECOMMENDED in production once devices are listed)
  unknown_exporter_mode: "allow"

# Device registry: map each exporter source IP to its identity, vendor profile,
# and per-device skip-rule overrides (omitted rule fields inherit rules.* above).
# Populate for production, then set security.unknown_exporter_mode: "reject".
devices: []
#  - name: "rtr-mikrotik-01"
#    enabled: true
#    exporter_ip: "203.0.113.10"
#    isp_id: 1
#    device_id: 101
#    protocol: netflow9       # netflow5 | netflow9 | ipfix | auto
#    profile: mikrotik        # mikrotik | cisco | juniper | huawei | generic
#    allowed_ports: [9995]
#    rules:
#      skip_dns: true
#      skip_private_to_private: true
#      skip_zero_bytes: false   # this device keeps zero-byte flows

metrics:
  bind: "127.0.0.1:9101"

logging:
  level: "info"
  file: "/var/log/natflow/collector.log"
