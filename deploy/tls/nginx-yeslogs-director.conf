# nginx TLS reverse proxy for YesLogs Director.
# Obtain a cert first:  certbot --nginx -d director.example.com
# Then bind natlog to loopback + cookie_secure:true (see Caddyfile notes).
server {
    listen 80;
    server_name director.example.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name director.example.com;

    ssl_certificate     /etc/letsencrypt/live/director.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/director.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    client_max_body_size 4m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
